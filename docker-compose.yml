# ============================================
# Docker Compose - Daily Exercise Tracker
# Run: docker-compose up --build
# ============================================



services:
  # -------- MongoDB Database --------
  mongo:
    image: mongo:7
    container_name: exercise-tracker-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  # -------- Backend API --------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exercise-tracker-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/exercise-tracker
      - JWT_SECRET=exercise_tracker_jwt_secret_2024
      - PORT=5000
      - NODE_ENV=production
    depends_on:
      - mongo
    networks:
      - app-network

  # -------- Frontend (React + Nginx) --------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exercise-tracker-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

# Persistent volume for MongoDB data
volumes:
  mongo-data:
    driver: local

# Internal network for service communication
networks:
  app-network:
    driver: bridge
